{% extends 'base/base.html' %}
{% block title %}Edit Profile — Brew & Bliss{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:700px;">
  <div class="cafe-card p-4">
    <h3 class="section-title mb-4">Edit Profile</h3>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        {% for field in form %}
        <div class="col-md-{% if field.name in 'first_name,last_name' %}6{% else %}12{% endif %}">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
      </div>
      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn btn-cafe px-4">Save Changes</button>
        <a href="{% url 'accounts:profile' %}" class="btn btn-outline-cafe px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
